name: bot-hybrid-worker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run worker
        env:
          DB_BACKEND: ${{ secrets.DB_BACKEND }}
          DB_PATH: bot.db
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_API_TOKEN: ${{ secrets.D1_API_TOKEN }}
        run: python bot/worker_scan.py
